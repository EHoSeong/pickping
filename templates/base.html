<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ site.name }}{% endblock %}</title>
<meta name="description" content="{% block description %}{{ site.description }}{% endblock %}">
<link rel="canonical" href="{{ site.base_url }}/{% block canonical %}{% endblock %}">
{% block head %}{% endblock %}
<style>
  :root {
    --ink: #1A1F2B; --muted: #667085; --line: #E7EAF0;
    --brand: #1F7A5A; --brand-soft: #E8F5EF; --bg: #FBFCFD; --card: #FFFFFF;
    --amber: #B7791F;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', 'Malgun Gothic', -apple-system, sans-serif;
    color: var(--ink); background: var(--bg); line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 0 20px; }
  .tnum { font-variant-numeric: tabular-nums; }
  a { color: var(--brand); }

  header.site {
    border-bottom: 1px solid var(--line); background: var(--card);
    padding: 16px 0;
  }
  header.site .name { font-weight: 800; font-size: 20px; color: var(--ink); text-decoration: none; }
  header.site .tag { color: var(--muted); font-size: 14px; margin-left: 8px; }

  main { padding: 32px 0 48px; }
  h1 { font-size: 32px; line-height: 1.25; letter-spacing: -0.02em; text-wrap: balance; }
  h2 { font-size: 22px; margin: 36px 0 14px; letter-spacing: -0.01em; }
  .lead { color: var(--muted); margin-top: 14px; font-size: 17px; }
  .meta-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
  .badge {
    background: var(--brand-soft); color: var(--brand); font-weight: 700;
    font-size: 13px; padding: 6px 12px; border-radius: 999px;
  }

  /* 가격대별 픽 */
  .picks { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
  .pick {
    border: 1px solid var(--line); border-radius: 14px; padding: 16px; background: var(--card);
  }
  .pick .k { font-size: 12px; font-weight: 800; color: var(--brand); letter-spacing: .04em; }
  .pick .nm { font-size: 15px; font-weight: 700; margin: 8px 0; }
  .pick .pr { font-size: 18px; font-weight: 800; }
  @media (max-width: 640px) { .picks { grid-template-columns: 1fr; } }

  /* 비교표 */
  .table-wrap { overflow-x: auto; margin-top: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--line); }
  th { background: #F4F6F9; font-size: 13px; color: var(--muted); font-weight: 700; }
  td.price { font-weight: 800; white-space: nowrap; }
  .rank { display: inline-grid; place-items: center; width: 26px; height: 26px;
    background: var(--brand-soft); color: var(--brand); border-radius: 8px; font-weight: 800; font-size: 13px; }
  .btn {
    display: inline-block; background: var(--brand); color: #fff; text-decoration: none;
    padding: 8px 14px; border-radius: 9px; font-weight: 700; font-size: 13px; white-space: nowrap;
  }

  /* 기준 / FAQ */
  .criteria, .faq { margin-top: 12px; }
  .criteria li { margin: 8px 0 8px 20px; }
  .faq details {
    border: 1px solid var(--line); border-radius: 12px; padding: 4px 16px;
    margin-bottom: 10px; background: var(--card);
  }
  .faq summary { font-weight: 700; padding: 12px 0; cursor: pointer; }
  .faq p { color: var(--muted); padding-bottom: 12px; }

  .index-list { list-style: none; margin-top: 16px; }
  .index-list li { border-bottom: 1px solid var(--line); }
  .index-list a { display: flex; justify-content: space-between; padding: 16px 4px;
    text-decoration: none; color: var(--ink); font-weight: 600; }
  .index-list .cat { color: var(--muted); font-size: 14px; font-weight: 500; }

  footer.site {
    border-top: 1px solid var(--line); margin-top: 40px; padding: 24px 0 48px;
    color: var(--muted); font-size: 13px;
  }
  .disclosure {
    background: #FFF8EC; border: 1px solid #F3E2BF; color: var(--amber);
    padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-top: 20px;
  }
</style>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <a href="{{ site.base_url }}/index.html" class="name">{{ site.name }}</a>
      <span class="tag">가격·브랜드 비교 추천</span>
    </div>
  </header>

  <main>
    <div class="wrap">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site">
    <div class="wrap">
      <p>본 사이트의 상품 정보는 네이버 쇼핑 검색 데이터를 기반으로 자동 정리되며,
         가격·재고는 실시간과 다를 수 있습니다. 구매 전 판매처에서 최종 확인하세요.</p>
      <p style="margin-top:8px;">&copy; {{ site.name }}</p>
    </div>
  </footer>
</body>
</html>
